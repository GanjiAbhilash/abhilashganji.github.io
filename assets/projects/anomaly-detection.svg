<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#ef4444">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Normal data points -->
  <g opacity="0.25">
    <circle cx="120" cy="220" r="5" fill="#3b82f6"/>
    <circle cx="160" cy="200" r="5" fill="#3b82f6"/>
    <circle cx="200" cy="230" r="5" fill="#3b82f6"/>
    <circle cx="240" cy="210" r="5" fill="#3b82f6"/>
    <circle cx="280" cy="225" r="5" fill="#3b82f6"/>
    <circle cx="320" cy="205" r="5" fill="#3b82f6"/>
    <circle cx="360" cy="215" r="5" fill="#3b82f6"/>
    <circle cx="400" cy="220" r="5" fill="#3b82f6"/>
    <circle cx="440" cy="195" r="5" fill="#3b82f6"/>
    <circle cx="480" cy="225" r="5" fill="#3b82f6"/>
    <circle cx="520" cy="210" r="5" fill="#3b82f6"/>
    <circle cx="560" cy="230" r="5" fill="#3b82f6"/>
    <circle cx="600" cy="200" r="5" fill="#3b82f6"/>
    <circle cx="640" cy="215" r="5" fill="#3b82f6"/>
    <circle cx="680" cy="220" r="5" fill="#3b82f6"/>
  </g>
  <!-- Anomaly points -->
  <g>
    <circle cx="350" cy="90" r="8" fill="#ef4444" opacity="0.7"/>
    <circle cx="350" cy="90" r="16" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
    <circle cx="350" cy="90" r="24" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.15"/>
    <circle cx="550" cy="340" r="8" fill="#ef4444" opacity="0.7"/>
    <circle cx="550" cy="340" r="16" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
    <circle cx="550" cy="340" r="24" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.15"/>
    <circle cx="180" cy="100" r="6" fill="#f59e0b" opacity="0.5"/>
    <circle cx="180" cy="100" r="14" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.2"/>
  </g>
  <!-- Decision boundary -->
  <ellipse cx="400" cy="210" rx="320" ry="80" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.2"/>
  <!-- Alert icon -->
  <g transform="translate(370, 140)" opacity="0.5">
    <polygon points="30,0 60,52 0,52" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="30" y1="18" x2="30" y2="35" stroke="#ef4444" stroke-width="3"/>
    <circle cx="30" cy="43" r="2.5" fill="#ef4444"/>
  </g>
</svg>