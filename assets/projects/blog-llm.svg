<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#6366f1">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>
  <!-- Attention matrix visualization -->
  <g transform="translate(100, 60)" opacity="0.18">
    <rect x="0" y="0" width="280" height="280" rx="8" fill="none" stroke="#6366f1" stroke-width="1"/>
    <!-- Attention scores as colored cells -->
    <rect x="10" y="10" width="40" height="40" rx="3" fill="#6366f1" opacity="0.9"/>
    <rect x="55" y="10" width="40" height="40" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="100" y="10" width="40" height="40" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="145" y="10" width="40" height="40" rx="3" fill="#6366f1" opacity="0.2"/>
    <rect x="190" y="10" width="40" height="40" rx="3" fill="#6366f1" opacity="0.5"/>
    <rect x="235" y="10" width="40" height="40" rx="3" fill="#6366f1" opacity="0.1"/>
    <rect x="10" y="55" width="40" height="40" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="55" y="55" width="40" height="40" rx="3" fill="#6366f1" opacity="0.85"/>
    <rect x="100" y="55" width="40" height="40" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="145" y="55" width="40" height="40" rx="3" fill="#6366f1" opacity="0.7"/>
    <rect x="190" y="55" width="40" height="40" rx="3" fill="#6366f1" opacity="0.2"/>
    <rect x="235" y="55" width="40" height="40" rx="3" fill="#6366f1" opacity="0.5"/>
    <rect x="10" y="100" width="40" height="40" rx="3" fill="#6366f1" opacity="0.5"/>
    <rect x="55" y="100" width="40" height="40" rx="3" fill="#6366f1" opacity="0.2"/>
    <rect x="100" y="100" width="40" height="40" rx="3" fill="#6366f1" opacity="0.9"/>
    <rect x="145" y="100" width="40" height="40" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="190" y="100" width="40" height="40" rx="3" fill="#6366f1" opacity="0.7"/>
    <rect x="235" y="100" width="40" height="40" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="10" y="145" width="40" height="40" rx="3" fill="#6366f1" opacity="0.2"/>
    <rect x="55" y="145" width="40" height="40" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="100" y="145" width="40" height="40" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="145" y="145" width="40" height="40" rx="3" fill="#6366f1" opacity="0.85"/>
    <rect x="190" y="145" width="40" height="40" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="235" y="145" width="40" height="40" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="10" y="190" width="40" height="40" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="55" y="190" width="40" height="40" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="100" y="190" width="40" height="40" rx="3" fill="#6366f1" opacity="0.5"/>
    <rect x="145" y="190" width="40" height="40" rx="3" fill="#6366f1" opacity="0.2"/>
    <rect x="190" y="190" width="40" height="40" rx="3" fill="#6366f1" opacity="0.9"/>
    <rect x="235" y="190" width="40" height="40" rx="3" fill="#6366f1" opacity="0.4"/>
    <rect x="10" y="235" width="40" height="40" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="55" y="235" width="40" height="40" rx="3" fill="#6366f1" opacity="0.5"/>
    <rect x="100" y="235" width="40" height="40" rx="3" fill="#6366f1" opacity="0.2"/>
    <rect x="145" y="235" width="40" height="40" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="190" y="235" width="40" height="40" rx="3" fill="#6366f1" opacity="0.3"/>
    <rect x="235" y="235" width="40" height="40" rx="3" fill="#6366f1" opacity="0.85"/>
  </g>
  <!-- Transformer blocks -->
  <g transform="translate(500, 40)" opacity="0.25">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="36" font-family="system-ui" font-size="14" fill="#a78bfa" text-anchor="middle">Multi-Head Attention</text>
    <rect x="0" y="80" width="180" height="60" rx="8" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="116" font-family="system-ui" font-size="14" fill="#a78bfa" text-anchor="middle">Feed Forward</text>
    <rect x="0" y="160" width="180" height="60" rx="8" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="196" font-family="system-ui" font-size="14" fill="#a78bfa" text-anchor="middle">Layer Norm</text>
    <rect x="0" y="240" width="180" height="60" rx="8" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="276" font-family="system-ui" font-size="14" fill="#a78bfa" text-anchor="middle">Softmax Output</text>
    <!-- Skip connections -->
    <path d="M180,30 C220,30 220,110 180,110" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M180,190 C220,190 220,270 180,270" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Arrows -->
    <line x1="90" y1="60" x2="90" y2="80" stroke="#a78bfa" stroke-width="1"/>
    <line x1="90" y1="140" x2="90" y2="160" stroke="#a78bfa" stroke-width="1"/>
    <line x1="90" y1="220" x2="90" y2="240" stroke="#a78bfa" stroke-width="1"/>
  </g>
  <!-- Token embeddings -->
  <g transform="translate(800, 100)" opacity="0.15">
    <rect x="0" y="0" width="70" height="200" rx="6" fill="#6366f1"/>
    <rect x="80" y="0" width="70" height="200" rx="6" fill="#8b5cf6"/>
    <rect x="160" y="0" width="70" height="200" rx="6" fill="#a78bfa"/>
    <rect x="240" y="0" width="70" height="200" rx="6" fill="#c4b5fd"/>
    <text x="35" y="220" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">Q</text>
    <text x="115" y="220" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">K</text>
    <text x="195" y="220" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">V</text>
    <text x="275" y="220" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">Out</text>
  </g>
  <!-- Floating elements -->
  <circle cx="450" cy="370" r="3" fill="#6366f1" opacity="0.3"/>
  <circle cx="750" cy="50" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="1100" cy="350" r="4" fill="#8b5cf6" opacity="0.2"/>
</svg>