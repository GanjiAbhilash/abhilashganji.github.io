<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a0a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#818cf8">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Chat bubbles / reviews -->
  <g opacity="0.2">
    <rect x="80" y="80" width="200" height="50" rx="25" fill="#818cf8"/>
    <rect x="120" y="80" width="200" height="50" rx="25" fill="none" stroke="#818cf8" stroke-width="1"/>
    <rect x="500" y="120" width="220" height="50" rx="25" fill="#818cf8"/>
    <rect x="100" y="170" width="180" height="50" rx="25" fill="#818cf8" opacity="0.6"/>
    <rect x="480" y="220" width="240" height="50" rx="25" fill="#818cf8" opacity="0.7"/>
    <rect x="120" y="270" width="200" height="50" rx="25" fill="#818cf8" opacity="0.5"/>
  </g>
  <!-- Sentiment indicators -->
  <g transform="translate(350, 100)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="#22c55e" opacity="0.3"/>
    <text x="0" y="7" font-family="system-ui" font-size="20" fill="#22c55e" text-anchor="middle">+</text>
  </g>
  <g transform="translate(400, 200)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="#ef4444" opacity="0.3"/>
    <text x="0" y="7" font-family="system-ui" font-size="20" fill="#ef4444" text-anchor="middle">−</text>
  </g>
  <g transform="translate(370, 300)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="#eab308" opacity="0.3"/>
    <text x="0" y="7" font-family="system-ui" font-size="20" fill="#eab308" text-anchor="middle">~</text>
  </g>
  <!-- Transformer label -->
  <g transform="translate(300, 350)">
    <rect x="0" y="0" width="200" height="36" rx="18" fill="#818cf8" opacity="0.12"/>
    <text x="100" y="24" font-family="system-ui" font-size="13" fill="#818cf8" text-anchor="middle" opacity="0.6" font-weight="600">HF Transformers</text>
  </g>
</svg>