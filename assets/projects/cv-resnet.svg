<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#14b8a6">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- ResNet blocks with skip connections -->
  <g transform="translate(100, 100)">
    <!-- Block 1 -->
    <rect x="0" y="40" width="80" height="120" rx="6" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1"/>
    <text x="40" y="105" font-family="system-ui" font-size="11" fill="#14b8a6" text-anchor="middle" opacity="0.6">Conv</text>
    <!-- Block 2 -->
    <rect x="120" y="40" width="80" height="120" rx="6" fill="#14b8a6" opacity="0.2" stroke="#14b8a6" stroke-width="1"/>
    <text x="160" y="105" font-family="system-ui" font-size="11" fill="#14b8a6" text-anchor="middle" opacity="0.6">Conv</text>
    <!-- Block 3 -->
    <rect x="240" y="40" width="80" height="120" rx="6" fill="#14b8a6" opacity="0.25" stroke="#14b8a6" stroke-width="1"/>
    <text x="280" y="105" font-family="system-ui" font-size="11" fill="#14b8a6" text-anchor="middle" opacity="0.6">Conv</text>
    <!-- Block 4 -->
    <rect x="360" y="40" width="80" height="120" rx="6" fill="#14b8a6" opacity="0.3" stroke="#14b8a6" stroke-width="1"/>
    <text x="400" y="105" font-family="system-ui" font-size="11" fill="#14b8a6" text-anchor="middle" opacity="0.6">Conv</text>
    <!-- FC -->
    <rect x="480" y="60" width="80" height="80" rx="6" fill="#14b8a6" opacity="0.35" stroke="#14b8a6" stroke-width="1"/>
    <text x="520" y="105" font-family="system-ui" font-size="11" fill="#14b8a6" text-anchor="middle" opacity="0.7">FC</text>
    <!-- Skip connections -->
    <path d="M40,40 C40,10 160,10 160,40" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>
    <path d="M160,40 C160,10 280,10 280,40" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>
    <path d="M280,40 C280,10 400,10 400,40" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>
    <!-- Arrows -->
    <line x1="80" y1="100" x2="120" y2="100" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="100" x2="240" y2="100" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
    <line x1="320" y1="100" x2="360" y2="100" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
    <line x1="440" y1="100" x2="480" y2="100" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
    <!-- Output -->
    <g transform="translate(580, 70)">
      <circle cx="20" cy="30" r="20" fill="#14b8a6" opacity="0.2" stroke="#14b8a6" stroke-width="1.5"/>
      <text x="20" y="36" font-family="system-ui" font-size="16" fill="#2dd4bf" text-anchor="middle">✓</text>
    </g>
  </g>
  <!-- Truck silhouette -->
  <g transform="translate(580, 280)" opacity="0.15">
    <rect x="0" y="0" width="80" height="40" rx="4" fill="#14b8a6"/>
    <rect x="80" y="10" width="40" height="30" rx="4" fill="#14b8a6"/>
    <circle cx="25" cy="45" r="10" fill="#14b8a6"/>
    <circle cx="100" cy="45" r="10" fill="#14b8a6"/>
  </g>
</svg>