<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#eab308">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Data flow pipes -->
  <g opacity="0.2">
    <!-- Left sources -->
    <rect x="50" y="80" width="100" height="50" rx="8" fill="#eab308" opacity="0.4"/>
    <rect x="50" y="150" width="100" height="50" rx="8" fill="#eab308" opacity="0.3"/>
    <rect x="50" y="220" width="100" height="50" rx="8" fill="#eab308" opacity="0.35"/>
    <rect x="50" y="290" width="100" height="50" rx="8" fill="#eab308" opacity="0.25"/>
    <!-- Funnel lines -->
    <line x1="150" y1="105" x2="280" y2="170" stroke="#eab308" stroke-width="2"/>
    <line x1="150" y1="175" x2="280" y2="185" stroke="#eab308" stroke-width="2"/>
    <line x1="150" y1="245" x2="280" y2="200" stroke="#eab308" stroke-width="2"/>
    <line x1="150" y1="315" x2="280" y2="215" stroke="#eab308" stroke-width="2"/>
  </g>
  <!-- ETL Box -->
  <g transform="translate(280, 140)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="1.5" opacity="0.3"/>
    <text x="60" y="40" font-family="system-ui" font-size="14" fill="#eab308" text-anchor="middle" opacity="0.7" font-weight="600">AWS Glue</text>
    <text x="60" y="62" font-family="system-ui" font-size="12" fill="#eab308" text-anchor="middle" opacity="0.5">PySpark</text>
    <!-- Gear icon -->
    <circle cx="60" cy="82" r="8" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.4"/>
    <circle cx="60" cy="82" r="3" fill="#eab308" opacity="0.4"/>
  </g>
  <!-- Arrow -->
  <line x1="400" y1="190" x2="480" y2="190" stroke="#eab308" stroke-width="2" opacity="0.3"/>
  <polygon points="480,185 490,190 480,195" fill="#eab308" opacity="0.3"/>
  <!-- Database -->
  <g transform="translate(500, 130)">
    <ellipse cx="70" cy="10" rx="70" ry="20" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="0" y="10" width="140" height="100" fill="#eab308" opacity="0.08"/>
    <line x1="0" y1="10" x2="0" y2="110" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="140" y1="10" x2="140" y2="110" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.3"/>
    <ellipse cx="70" cy="110" rx="70" ry="20" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.3"/>
    <ellipse cx="70" cy="45" rx="70" ry="20" fill="none" stroke="#eab308" stroke-width="1" stroke-opacity="0.15"/>
    <ellipse cx="70" cy="75" rx="70" ry="20" fill="none" stroke="#eab308" stroke-width="1" stroke-opacity="0.15"/>
    <text x="70" y="64" font-family="system-ui" font-size="13" fill="#eab308" text-anchor="middle" opacity="0.6" font-weight="600">Redshift</text>
  </g>
  <!-- 10B+ label -->
  <g transform="translate(310, 60)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="#eab308" opacity="0.1"/>
    <text x="80" y="24" font-family="system-ui" font-size="14" fill="#eab308" text-anchor="middle" opacity="0.6" font-weight="700">10B+ Rows</text>
  </g>
</svg>