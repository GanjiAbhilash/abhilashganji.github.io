<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#0ea5e9">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- People icons -->
  <g opacity="0.12" fill="#0ea5e9">
    <circle cx="120" cy="90" r="15"/><rect x="105" y="112" width="30" height="35" rx="8"/>
    <circle cx="180" cy="90" r="15"/><rect x="165" y="112" width="30" height="35" rx="8"/>
    <circle cx="240" cy="90" r="15"/><rect x="225" y="112" width="30" height="35" rx="8"/>
    <circle cx="300" cy="90" r="15"/><rect x="285" y="112" width="30" height="35" rx="8"/>
    <circle cx="120" cy="180" r="15" opacity="0.5"/><rect x="105" y="202" width="30" height="35" rx="8" opacity="0.5"/>
    <circle cx="180" cy="180" r="15" opacity="0.5"/><rect x="165" y="202" width="30" height="35" rx="8" opacity="0.5"/>
    <circle cx="240" cy="180" r="15" opacity="0.7"/><rect x="225" y="202" width="30" height="35" rx="8" opacity="0.7"/>
  </g>
  <!-- Chart -->
  <g transform="translate(380, 60)">
    <line x1="30" y1="280" x2="360" y2="280" stroke="#0ea5e9" stroke-width="1" opacity="0.2"/>
    <line x1="30" y1="40" x2="30" y2="280" stroke="#0ea5e9" stroke-width="1" opacity="0.2"/>
    <!-- Bars -->
    <rect x="60" y="180" width="30" height="100" rx="4" fill="#0ea5e9" opacity="0.2"/>
    <rect x="110" y="140" width="30" height="140" rx="4" fill="#0ea5e9" opacity="0.25"/>
    <rect x="160" y="100" width="30" height="180" rx="4" fill="#0ea5e9" opacity="0.3"/>
    <rect x="210" y="120" width="30" height="160" rx="4" fill="#0ea5e9" opacity="0.35"/>
    <rect x="260" y="80" width="30" height="200" rx="4" fill="#0ea5e9" opacity="0.4"/>
    <rect x="310" y="60" width="30" height="220" rx="4" fill="#38bdf8" opacity="0.3"/>
    <!-- Trend line -->
    <polyline points="75,170 125,130 175,90 225,110 275,70 325,50" 
              fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  </g>
  <!-- 96% label -->
  <g transform="translate(500, 20)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="#0ea5e9" opacity="0.12"/>
    <text x="80" y="24" font-family="system-ui" font-size="14" fill="#0ea5e9" text-anchor="middle" opacity="0.7" font-weight="700">96% Automated</text>
  </g>
</svg>