<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#3b82f6">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Time series chart -->
  <g transform="translate(100, 60)">
    <!-- Axes -->
    <line x1="50" y1="280" x2="600" y2="280" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="40" x2="50" y2="280" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <!-- Historical data -->
    <polyline points="50,200 100,180 150,220 200,170 250,190 300,160 350,180" 
              fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.7"/>
    <!-- Forecast line (dashed) -->
    <polyline points="350,180 400,150 450,130 500,120 550,100 600,80" 
              fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.6"/>
    <!-- Confidence interval -->
    <path d="M350,180 L400,135 L450,105 L500,85 L550,60 L600,35 L600,125 L550,140 L500,155 L450,155 L400,165 Z" 
          fill="#3b82f6" opacity="0.08"/>
    <!-- Data points -->
    <circle cx="50" cy="200" r="4" fill="#3b82f6" opacity="0.8"/>
    <circle cx="100" cy="180" r="4" fill="#3b82f6" opacity="0.8"/>
    <circle cx="150" cy="220" r="4" fill="#3b82f6" opacity="0.8"/>
    <circle cx="200" cy="170" r="4" fill="#3b82f6" opacity="0.8"/>
    <circle cx="250" cy="190" r="4" fill="#3b82f6" opacity="0.8"/>
    <circle cx="300" cy="160" r="4" fill="#3b82f6" opacity="0.8"/>
    <circle cx="350" cy="180" r="5" fill="#60a5fa"/>
    <!-- Divider -->
    <line x1="350" y1="40" x2="350" y2="280" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <text x="200" y="310" font-family="system-ui" font-size="12" fill="#60a5fa" opacity="0.5" text-anchor="middle">Historical</text>
    <text x="475" y="310" font-family="system-ui" font-size="12" fill="#60a5fa" opacity="0.5" text-anchor="middle">Forecast</text>
  </g>
  <circle cx="720" cy="60" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="60" cy="350" r="2" fill="#60a5fa" opacity="0.3"/>
</svg>