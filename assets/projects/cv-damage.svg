<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#f59e0b">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Camera/scanning frame -->
  <g transform="translate(250, 80)" opacity="0.3">
    <rect x="0" y="0" width="300" height="240" rx="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#fbbf24" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#fbbf24" stroke-width="4"/>
    <line x1="260" y1="0" x2="300" y2="0" stroke="#fbbf24" stroke-width="4"/>
    <line x1="300" y1="0" x2="300" y2="40" stroke="#fbbf24" stroke-width="4"/>
    <line x1="0" y1="240" x2="40" y2="240" stroke="#fbbf24" stroke-width="4"/>
    <line x1="0" y1="200" x2="0" y2="240" stroke="#fbbf24" stroke-width="4"/>
    <line x1="260" y1="240" x2="300" y2="240" stroke="#fbbf24" stroke-width="4"/>
    <line x1="300" y1="200" x2="300" y2="240" stroke="#fbbf24" stroke-width="4"/>
  </g>
  <!-- Box icon -->
  <g transform="translate(340, 140)" opacity="0.6">
    <path d="M0 20L60 0L120 20L120 80L60 100L0 80Z" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="100" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="20" x2="120" y2="20" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <!-- Damage marks -->
    <line x1="80" y1="40" x2="100" y2="60" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
    <line x1="100" y1="40" x2="80" y2="60" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
  </g>
  <!-- CNN layers -->
  <g opacity="0.15">
    <rect x="80" y="120" width="80" height="160" rx="4" fill="#f59e0b"/>
    <rect x="100" y="130" width="80" height="140" rx="4" fill="#f59e0b"/>
    <rect x="120" y="140" width="80" height="120" rx="4" fill="#fbbf24"/>
    <rect x="600" y="140" width="60" height="120" rx="4" fill="#f59e0b"/>
    <rect x="670" y="160" width="40" height="80" rx="4" fill="#fbbf24"/>
  </g>
  <!-- Scan line -->
  <rect x="250" y="195" width="300" height="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="90" cy="50" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="710" cy="350" r="3" fill="#fbbf24" opacity="0.3"/>
</svg>